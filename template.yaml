AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Zoolanding Config Runtime Read Lambda - SAM Template

Parameters:
  ConfigTableName:
    Type: String
    Default: zoolanding-config-registry
    Description: DynamoDB table that stores site routing, lifecycle, and version metadata.
  ConfigPayloadsBucketName:
    Type: String
    Default: zoolanding-config-payloads
    Description: S3 bucket that stores versioned site payloads.
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]
    Description: Log level for the Lambda.

Globals:
  Function:
    Runtime: python3.13
    Timeout: 10
    MemorySize: 256
    Tracing: PassThrough

Resources:
  RuntimeApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,OPTIONS'"

  ConfigRuntimeReadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Description: Resolves the current site by domain and route and returns one effective runtime bundle.
      Environment:
        Variables:
          CONFIG_TABLE_NAME:
            Ref: ConfigTableName
          CONFIG_PAYLOADS_BUCKET_NAME:
            Ref: ConfigPayloadsBucketName
          LOG_LEVEL:
            Ref: LogLevel
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ConfigTableName}
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                Fn::Sub: arn:aws:s3:::${ConfigPayloadsBucketName}/*
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                Fn::Sub: arn:aws:s3:::${ConfigPayloadsBucketName}
      Events:
        RuntimeBundleGet:
          Type: Api
          Properties:
            RestApiId:
              Ref: RuntimeApi
            Path: /runtime-bundle
            Method: GET

Outputs:
  ApiUrl:
    Description: Runtime bundle endpoint URL.
    Value:
      Fn::Sub: https://${RuntimeApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/runtime-bundle
  FunctionName:
    Description: Deployed Lambda function name.
    Value:
      Ref: ConfigRuntimeReadFunction
